<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retro Glossary</title>
  <style>
    :root{
      --bg:#05070a;
      --fg:#b7ff3c;
      --muted:#72c64a;
      --panel: rgba(15, 28, 12, .75);
      --border: rgba(183, 255, 60, .35);
      --glow: rgba(183, 255, 60, .35);
      --link:#b7ff3c;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: var(--bg);
      color: var(--fg);
    }
    .scanlines{
      position:fixed; inset:0; pointer-events:none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.05),
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.00) 4px
      );
      opacity:.35;
      mix-blend-mode: overlay;
    }
    header{
      padding:28px 18px 14px;
      border-bottom:1px solid var(--border);
      background: linear-gradient(180deg, rgba(183,255,60,.10), rgba(183,255,60,0));
    }
    .title{
      display:flex; flex-wrap:wrap; gap:14px; align-items:baseline;
    }
    .brand, .brand2{
      letter-spacing:.12em;
      font-weight:900;
      text-transform:uppercase;
    }
    .brand{
      color: var(--fg);
      text-shadow: 0 0 12px var(--glow);
      font-size: clamp(26px, 4vw, 38px);
    }
    .brand2{
      color: var(--muted);
      font-size: clamp(20px, 3.3vw, 32px);
    }
    .subtitle{
      margin-top:8px;
      color: rgba(183,255,60,.85);
    }
    .wrap{
      max-width:1000px;
      margin:0 auto;
      padding:18px;
    }
    .card{
      background: var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:18px;
      box-shadow: 0 0 22px rgba(183,255,60,.06);
    }
    .card h2{
      margin:0 0 10px;
      font-size:22px;
    }
    .hint{
      margin:0 0 16px;
      color: rgba(183,255,60,.82);
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap:12px;
    }
    a.tool{
      display:block;
      padding:14px;
      border:1px solid rgba(183,255,60,.35);
      border-radius:10px;
      text-decoration:none;
      color: var(--link);
      background: rgba(0,0,0,.15);
      transition: transform .08s ease, box-shadow .15s ease, border-color .15s ease;
    }
    a.tool:hover{
      transform: translateY(-2px);
      border-color: rgba(183,255,60,.75);
      box-shadow: 0 0 18px rgba(183,255,60,.18);
    }
    .tool-name{ font-weight:900; margin-bottom:6px; }
    .tool-meta{ color: rgba(183,255,60,.75); font-size:12px; word-break:break-word; }
    footer{
      margin-top:16px;
      padding:8px 2px 0;
      color: rgba(183,255,60,.75);
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <header>
    <div class="title">
      <div class="brand">RETRO</div>
      <div class="brand2">GLOSSARY</div>
    </div>
    <div class="subtitle">Select a term to jump to a tool.</div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Tools</h2>
      <p class="hint">Published by folder (GitHub Pages).</p>

      <div class="grid">
        <!-- Tool link(s). Currently detected tool page(s): ee-toolbox-pro-next-pass -->
        <a class="tool" href="./ee-toolbox-pro-next-pass/">
          <div class="tool-name">EE Toolbox Pro (Next Pass)</div>
          <div class="tool-meta">ee-toolbox-pro-next-pass</div>
        </a>
      </div>
    </section>

    <footer>Built for GitHub Pages • Retro mode: ON</footer>
  </main>
</body>
</html>
